<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — Kingshot Help</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #f0f3f7;
  --surface:    #ffffff;
  --surface2:   #edf0f5;
  --border:     #ccd4e0;
  --border2:    #dde3ec;
  --amber:      #b86e00;
  --amber-dim:  #d48820;
  --amber-glow: rgba(184,110,0,.10);
  --red:        #c0392b;
  --red-dim:    rgba(192,57,43,.10);
  --green:      #1a7a44;
  --green-dim:  rgba(26,122,68,.10);
  --inf:        #1a68aa;
  --cav:        #1e8040;
  --arc:        #8a5800;
  --text:       #18202e;
  --text-dim:   #445068;
  --text-faint: #8090a8;
  --f-display:  'Barlow Condensed', sans-serif;
  --f-body:     'Barlow', sans-serif;
  --f-mono:     'Share Tech Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  padding: 0 0 80px;
  background-image:
    linear-gradient(rgba(180,195,215,.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,195,215,.4) 1px, transparent 1px);
  background-size: 40px 40px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.008) 2px, rgba(0,0,0,.008) 4px);
  pointer-events: none; z-index: 100;
}

.page { max-width: 680px; margin: 0 auto; padding: 0 16px; }

/* ── HEADER ── */
.hdr {
  padding: 32px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  position: relative;
}
.hdr::after {
  content: ''; position: absolute; bottom: -1px; left: 0;
  width: 80px; height: 2px;
  background: var(--amber); box-shadow: 0 0 12px var(--amber);
}
.hdr-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.hdr-label { font-family: var(--f-mono); font-size: 11px; color: var(--amber); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; opacity: .9; }
.hdr-title { font-family: var(--f-display); font-size: 3rem; font-weight: 900; line-height: .9; text-transform: uppercase; letter-spacing: -1px; color: var(--text); }
.hdr-title span { color: var(--amber); }
.hdr-sub { font-family: var(--f-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
.back-link {
  font-family: var(--f-mono); font-size: 11px; color: var(--amber);
  text-decoration: none; letter-spacing: 1.5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
  transition: opacity .2s;
}
.back-link:hover { opacity: .7; }

/* ── SECTION ── */
.sec {
  display: flex; align-items: center; gap: 0;
  margin: 28px 0 14px;
}
.sec-num {
  font-family: var(--f-mono); font-size: 11px; color: #fff;
  background: var(--amber); padding: 4px 10px;
  letter-spacing: 1px; font-weight: 700; flex-shrink: 0;
}
.sec-body {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border); border-left: none;
  padding: 9px 16px;
}
.sec-title { font-family: var(--f-display); font-size: 1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
.sec-desc  { font-size: 12px; color: var(--text-faint); margin-top: 1px; }

/* ── PANEL ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  margin-bottom: 10px;
}
.panel-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.panel-body { padding: 16px 18px; }

/* ── PROFIL INFO ── */
.profile-info {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.profile-avatar {
  width: 52px; height: 52px;
  background: var(--amber-glow);
  border: 2px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-display); font-size: 1.6rem; font-weight: 900;
  color: var(--amber); text-transform: uppercase; flex-shrink: 0;
}
.profile-name {
  font-family: var(--f-display); font-size: 1.8rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px; line-height: 1;
}
.profile-meta {
  font-family: var(--f-mono); font-size: 10px; color: var(--text-faint);
  letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.profile-meta span { color: var(--amber); }

/* ── BOUTONS ── */
.btn {
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; padding: 7px 14px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
.btn-primary { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
.btn-primary:hover { background: rgba(184,110,0,.2); }
.btn-green { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.btn-green:hover { background: rgba(26,122,68,.2); }
.btn-red { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.btn-red:hover { background: rgba(192,57,43,.2); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* ── COMPO CARDS ── */
.compo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
.compo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
  transition: box-shadow .2s, border-color .2s, transform .2s;
}
.compo-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber), transparent 70%);
}
.compo-card:hover {
  border-color: var(--amber-dim);
  box-shadow: 0 4px 20px rgba(184,110,0,.10);
  transform: translateY(-2px);
}
.compo-card-body { padding: 14px 16px 12px; }
.compo-name {
  font-family: var(--f-display); font-size: 1.1rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text);
  margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.compo-summary {
  font-family: var(--f-mono); font-size: 11px; color: var(--text-faint);
  letter-spacing: 1px; margin-bottom: 10px; line-height: 1.8;
}
.compo-summary-line { display: flex; align-items: center; gap: 6px; }
.compo-summary-line .lbl { color: var(--text-dim); min-width: 60px; }
.compo-date {
  font-family: var(--f-mono); font-size: 9px; color: var(--text-faint);
  letter-spacing: 1px; text-transform: uppercase;
  position: absolute; top: 10px; right: 12px;
}
.compo-actions { display: flex; gap: 6px; border-top: 1px solid var(--border2); padding: 10px 16px; }
.compo-actions .btn { flex: 1; text-align: center; font-size: 10px; padding: 6px 8px; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 40px 20px;
  border: 1px dashed var(--border2);
  background: var(--surface2);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .5; }
.empty-title { font-family: var(--f-display); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
.empty-sub { font-size: 13px; color: var(--text-faint); margin-top: 6px; }

/* ── NOT LOGGED ── */
.not-logged {
  text-align: center; padding: 48px 20px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.not-logged-icon { font-size: 3rem; margin-bottom: 16px; }
.not-logged-title { font-family: var(--f-display); font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
.not-logged-sub { font-size: 13px; color: var(--text-dim); margin-top: 8px; max-width: 320px; margin-left: auto; margin-right: auto; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-box {
  background: var(--bg);
  border: 1px solid var(--border);
  max-width: 440px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  padding: 24px;
  position: relative;
}
.modal-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber), transparent 70%);
}
.modal-title {
  font-family: var(--f-display); font-size: 1.3rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
}
.field-label {
  font-family: var(--f-mono); font-size: 10px; color: var(--text-dim);
  letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px;
}
.field-input {
  width: 100%; padding: 8px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  font-family: var(--f-body); font-size: 14px; color: var(--text);
  outline: none; transition: border-color .2s;
}
.field-input:focus { border-color: var(--amber); }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

/* ── LOADING ── */
.loading-bar {
  height: 2px; background: var(--surface2);
  border: 1px solid var(--border2);
  overflow: hidden; margin-bottom: 16px;
}
.loading-bar-inner {
  height: 100%;
  background: var(--amber);
  animation: loadAnim 1s ease-in-out infinite alternate;
  width: 40%;
}
@keyframes loadAnim { from { margin-left: 0 } to { margin-left: 60% } }

/* ── TOAST ── */
#profToast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; font-family: var(--f-mono); font-size: 12px;
  letter-spacing: 1px; z-index: 9999; transition: opacity .4s;
  pointer-events: none; opacity: 0; color: #fff;
}

/* ── FOOTER ── */
footer {
  text-align: center; margin-top: 48px;
  padding-top: 20px; border-top: 1px solid var(--border2);
  font-family: var(--f-mono); font-size: 10px;
  letter-spacing: 1.5px; color: var(--text-faint); text-transform: uppercase;
}

/* ── ANIM ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hdr        { animation: fadeUp .3s ease both; }
.sec        { animation: fadeUp .3s ease both .08s; }
#mainContent{ animation: fadeUp .3s ease both .12s; }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-label">// Kingshot Help</div>
        <div class="hdr-title">Mon <span>Profil</span></div>
        <div class="hdr-sub">Compte · Compositions sauvegardées</div>
      </div>
      <a href="index.html" class="back-link">← Accueil</a>
    </div>
  </div>

  <!-- CONTENU AUTH (injecté par auth-bundle) -->
  <!-- authBar sera inséré ici automatiquement -->

  <div id="mainContent">
    <!-- rempli par JS -->
  </div>

</div>

<footer>Kingshot Help · Non affilié à Century Games</footer>
<div id="profToast"></div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG SUPABASE
// ══════════════════════════════════════════════════
const SUPA_URL = 'https://ndusomdjunpvabmwvuqr.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdXNvbWRqdW5wdmFibXd2dXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzcwNjYsImV4cCI6MjA5MDkxMzA2Nn0.5AD_2hvmJQlPQnum75R1-vrFgxpQXqYBAgHKwuFApsc';

let sb = null;
let currentUser = null;
let compositions = [];

try { currentUser = JSON.parse(localStorage.getItem('ksUser') || 'null'); } catch(e) {}

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
function fmtN(n) {
  const v = Number(n);
  if (!v || isNaN(v)) return '0';
  return v.toLocaleString('fr-FR');
}

function toast(msg, type = 'info') {
  const t = document.getElementById('profToast');
  const colors = { ok: '#1a7a44', err: '#c0392b', info: '#b86e00' };
  t.textContent = msg;
  t.style.background = colors[type] || colors.info;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', 2500);
}

function getSb() {
  if (!sb && typeof supabase !== 'undefined') {
    sb = supabase.createClient(SUPA_URL, SUPA_KEY);
  }
  return sb;
}

// ══════════════════════════════════════════════════
//  RÉSUMÉ D'UNE COMPOSITION
// ══════════════════════════════════════════════════
function buildCompoSummary(cs) {
  const inf = Number(cs.inf || 0);
  const cav = Number(cs.cav || 0);
  const arc = Number(cs.arc || 0);
  const leadCap = Number(cs.leadCap || 0);
  const joiners = (cs.joiners || []).filter(j => Number(j.cap || 0) > 0);

  const lines = [];

  if (inf || cav || arc) {
    lines.push({ lbl: 'Stocks', val: `INF ${fmtN(inf)} · CAV ${fmtN(cav)} · ARC ${fmtN(arc)}` });
  }
  if (leadCap) {
    const ri = cs.lInf || 10, rc = cs.lCav || 10, ra = cs.lArc || 80;
    lines.push({ lbl: '👑 Lead', val: `${fmtN(leadCap)} · ${ri}/${rc}/${ra}` });
  }
  joiners.forEach((j, i) => {
    const ri = j.inf || 5, rc = j.cav || 5, ra = j.arc || 90;
    lines.push({ lbl: `⚡ J${i + 1}`, val: `${fmtN(j.cap)} · ${ri}/${rc}/${ra}` });
  });

  if (lines.length === 0) lines.push({ lbl: 'Stocks', val: 'Aucune donnée' });
  return lines;
}

// ══════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ══════════════════════════════════════════════════
function renderMain() {
  const el = document.getElementById('mainContent');

  if (!currentUser) {
    el.innerHTML = `
      <div class="not-logged">
        <div class="not-logged-icon">🔒</div>
        <div class="not-logged-title">Connexion requise</div>
        <div class="not-logged-sub">Connecte-toi via la barre ci-dessus pour accéder à ton profil et tes compositions.</div>
      </div>`;
    return;
  }

  // Profil info
  const initial = (currentUser.username || '?')[0].toUpperCase();
  const compoCount = compositions.length;

  el.innerHTML = `
    <!-- PROFIL -->
    <div class="sec">
      <div class="sec-num">01</div>
      <div class="sec-body">
        <div class="sec-title">Informations</div>
        <div class="sec-desc">Ton compte Kingshot Help</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-accent" style="background:linear-gradient(90deg,var(--amber),transparent 70%)"></div>
      <div class="panel-body">
        <div class="profile-info">
          <div class="profile-avatar">${initial}</div>
          <div>
            <div class="profile-name">${currentUser.username}</div>
            <div class="profile-meta">
              ${currentUser.alliance ? `Alliance <span>${currentUser.alliance}</span>` : ''}
              ${currentUser.server   ? `Serveur <span>${currentUser.server}</span>`   : ''}
              <span>${compoCount} compo${compoCount > 1 ? 's' : ''}</span>
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="openEditProfile()">⚙ Modifier le profil</button>
          <a href="bear_calculator.html" class="btn" style="text-decoration:none;display:inline-block">🐻 Aller au calculateur</a>
        </div>
      </div>
    </div>

    <!-- COMPOSITIONS -->
    <div class="sec">
      <div class="sec-num">02</div>
      <div class="sec-body">
        <div class="sec-title">Mes compositions</div>
        <div class="sec-desc">Sauvegarde et charge tes configs Bear Hunt</div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary" onclick="openSaveModal()">＋ Sauvegarder la config actuelle</button>
    </div>

    <div id="compoList"></div>
  `;

  renderCompos();
}

function renderCompos() {
  const el = document.getElementById('compoList');
  if (!el) return;

  if (compositions.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Aucune composition</div>
        <div class="empty-sub">Sauvegarde ta config Bear Hunt depuis le calculateur, puis reviens ici pour la retrouver.</div>
      </div>`;
    return;
  }

  const html = `<div class="compo-grid">${compositions.map((c, i) => {
    const summary = buildCompoSummary(c.calc_state || {});
    const date = c.created_at
      ? new Date(c.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: '2-digit' })
      : '';
    const summaryHtml = summary.map(s =>
      `<div class="compo-summary-line"><span class="lbl">${s.lbl}</span><span>${s.val}</span></div>`
    ).join('');

    return `
      <div class="compo-card" id="card_${i}">
        <div class="compo-date">${date}</div>
        <div class="compo-card-body">
          <div class="compo-name">${escHtml(c.name)}</div>
          <div class="compo-summary">${summaryHtml}</div>
        </div>
        <div class="compo-actions">
          <button class="btn btn-green" onclick="loadCompo(${i})">▶ Charger</button>
          <button class="btn" onclick="openRenameModal(${i})">✎ Renommer</button>
          <button class="btn btn-red" onclick="deleteCompo(${i})">✕</button>
        </div>
      </div>`;
  }).join('')}</div>`;

  el.innerHTML = html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════
//  CHARGER LES COMPOSITIONS DEPUIS SUPABASE
// ══════════════════════════════════════════════════
async function loadCompos() {
  const client = getSb();
  if (!client || !currentUser) return;

  showLoading(true);
  try {
    const res = await client
      .from('compositions')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    if (res.error) throw res.error;
    compositions = res.data || [];
  } catch(e) {
    console.error('Load compos error:', e);
    toast('Erreur chargement compositions', 'err');
  }
  showLoading(false);
  renderCompos();
}

// ══════════════════════════════════════════════════
//  SAUVEGARDER UNE COMPOSITION
// ══════════════════════════════════════════════════
function openSaveModal() {
  const raw = localStorage.getItem('bearCalcState');
  if (!raw) {
    toast('Aucune config à sauvegarder — ouvre d\'abord le calculateur', 'err');
    return;
  }

  const modal = createModal(`
    <div class="modal-title">💾 Sauvegarder la composition</div>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:14px">Donne un nom à ta configuration Bear Hunt actuelle.</p>
    <label class="field-label">Nom de la composition</label>
    <input id="compoNameInput" class="field-input" type="text" placeholder="ex : Rally 5 joiners INF" maxlength="60" autofocus>
    <div id="saveError" style="display:none;margin-top:8px;font-size:12px;color:var(--red)"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-green" onclick="doSaveCompo()">✓ Sauvegarder</button>
    </div>
  `);

  setTimeout(() => document.getElementById('compoNameInput')?.focus(), 50);
  document.getElementById('compoNameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSaveCompo();
  });
}

async function doSaveCompo() {
  const nameEl = document.getElementById('compoNameInput');
  const errEl  = document.getElementById('saveError');
  const name = (nameEl?.value || '').trim();

  if (!name) {
    errEl.textContent = 'Donne un nom à ta composition';
    errEl.style.display = 'block';
    return;
  }

  const raw = localStorage.getItem('bearCalcState');
  if (!raw) { toast('Aucune config trouvée', 'err'); closeModal(); return; }

  let calcState;
  try { calcState = JSON.parse(raw); } catch(e) { toast('Config invalide', 'err'); closeModal(); return; }

  const client = getSb();
  if (!client) { toast('Supabase non disponible', 'err'); return; }

  nameEl.disabled = true;
  try {
    const res = await client.from('compositions').insert({
      user_id:    currentUser.id,
      username:   currentUser.username,
      name:       name,
      calc_state: calcState
    }).select().single();

    if (res.error) throw res.error;
    compositions.unshift(res.data);
    toast('Composition sauvegardée !', 'ok');
    closeModal();
    renderCompos();
  } catch(e) {
    console.error('Save compo error:', e);
    // Table absente → afficher message d'aide
    if (e.code === '42P01' || e.message?.includes('does not exist')) {
      errEl.innerHTML = 'Table <code>compositions</code> manquante dans Supabase.<br>Voir console pour le SQL de création.';
      console.warn('SQL à exécuter dans Supabase :\n' + CREATE_TABLE_SQL);
    } else {
      errEl.textContent = 'Erreur : ' + e.message;
    }
    errEl.style.display = 'block';
    nameEl.disabled = false;
  }
}

// ══════════════════════════════════════════════════
//  CHARGER UNE COMPOSITION DANS LE CALCULATEUR
// ══════════════════════════════════════════════════
function loadCompo(idx) {
  const c = compositions[idx];
  if (!c) return;

  if (!confirm(`Charger "${c.name}" ?\nCela remplacera ta config actuelle dans le calculateur.`)) return;

  try {
    localStorage.setItem('bearCalcState', JSON.stringify(c.calc_state));
    toast('Config chargée ! Redirection…', 'ok');
    setTimeout(() => window.location.href = 'bear_calculator.html', 900);
  } catch(e) {
    toast('Erreur lors du chargement', 'err');
  }
}

// ══════════════════════════════════════════════════
//  RENOMMER
// ══════════════════════════════════════════════════
function openRenameModal(idx) {
  const c = compositions[idx];
  if (!c) return;

  createModal(`
    <div class="modal-title">✎ Renommer</div>
    <label class="field-label">Nouveau nom</label>
    <input id="renameInput" class="field-input" type="text" value="${escHtml(c.name)}" maxlength="60">
    <div id="renameError" style="display:none;margin-top:8px;font-size:12px;color:var(--red)"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="doRename(${idx})">✓ Renommer</button>
    </div>
  `);

  setTimeout(() => {
    const inp = document.getElementById('renameInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

async function doRename(idx) {
  const c = compositions[idx];
  const nameEl = document.getElementById('renameInput');
  const errEl  = document.getElementById('renameError');
  const name = (nameEl?.value || '').trim();

  if (!name) { errEl.textContent = 'Nom invalide'; errEl.style.display = 'block'; return; }

  const client = getSb();
  try {
    const res = await client.from('compositions').update({ name }).eq('id', c.id);
    if (res.error) throw res.error;
    compositions[idx].name = name;
    toast('Renommée !', 'ok');
    closeModal();
    renderCompos();
  } catch(e) {
    errEl.textContent = 'Erreur : ' + e.message;
    errEl.style.display = 'block';
  }
}

// ══════════════════════════════════════════════════
//  SUPPRIMER
// ══════════════════════════════════════════════════
async function deleteCompo(idx) {
  const c = compositions[idx];
  if (!c) return;
  if (!confirm(`Supprimer "${c.name}" ? Cette action est irréversible.`)) return;

  const client = getSb();
  try {
    const res = await client.from('compositions').delete().eq('id', c.id);
    if (res.error) throw res.error;
    compositions.splice(idx, 1);
    toast('Composition supprimée', 'info');
    renderCompos();
  } catch(e) {
    toast('Erreur : ' + e.message, 'err');
  }
}

// ══════════════════════════════════════════════════
//  MODIFIER PROFIL
// ══════════════════════════════════════════════════
function openEditProfile() {
  createModal(`
    <div class="modal-title">⚙ Modifier le profil</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label class="field-label">Alliance (tag)</label>
        <input id="editAlliance" class="field-input" type="text" value="${escHtml(currentUser.alliance || '')}" placeholder="[TAG]">
      </div>
      <div>
        <label class="field-label">Serveur</label>
        <input id="editServer" class="field-input" type="text" value="${escHtml(currentUser.server || '')}" placeholder="S.1507">
      </div>
    </div>
    <div id="editError" style="display:none;margin-top:8px;font-size:12px;color:var(--red)"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="doEditProfile()">✓ Enregistrer</button>
    </div>
  `);
}

async function doEditProfile() {
  const alliance = (document.getElementById('editAlliance')?.value || '').trim();
  const server   = (document.getElementById('editServer')?.value   || '').trim();
  const errEl    = document.getElementById('editError');
  const client   = getSb();
  if (!client) return;

  try {
    const res = await client.from('profiles')
      .update({ alliance, server })
      .eq('id', currentUser.id);
    if (res.error) throw res.error;
    currentUser.alliance = alliance;
    currentUser.server   = server;
    localStorage.setItem('ksUser', JSON.stringify(currentUser));
    toast('Profil mis à jour', 'ok');
    closeModal();
    renderMain();
    setTimeout(renderCompos, 50);
  } catch(e) {
    errEl.textContent = 'Erreur : ' + e.message;
    errEl.style.display = 'block';
  }
}

// ══════════════════════════════════════════════════
//  MODAL HELPER
// ══════════════════════════════════════════════════
function createModal(innerHtml) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'profModal';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal-box">${innerHtml}</div>`;
  document.body.appendChild(overlay);
  return overlay;
}

function closeModal() {
  document.getElementById('profModal')?.remove();
}

// ══════════════════════════════════════════════════
//  LOADING
// ══════════════════════════════════════════════════
function showLoading(show) {
  let bar = document.getElementById('profLoadingBar');
  if (show) {
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'profLoadingBar';
      bar.className = 'loading-bar';
      bar.innerHTML = '<div class="loading-bar-inner"></div>';
      document.getElementById('mainContent').prepend(bar);
    }
  } else {
    bar?.remove();
  }
}

// ══════════════════════════════════════════════════
//  SQL DE CRÉATION DE LA TABLE (log console si absente)
// ══════════════════════════════════════════════════
const CREATE_TABLE_SQL = `
-- À exécuter dans Supabase > SQL Editor
CREATE TABLE IF NOT EXISTS compositions (
  id         UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id    UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  username   TEXT NOT NULL,
  name       TEXT NOT NULL,
  calc_state JSONB NOT NULL DEFAULT '{}',
  created_at TIMESTAMPTZ DEFAULT now()
);
-- Index pour les requêtes par user
CREATE INDEX IF NOT EXISTS idx_compositions_user_id ON compositions(user_id);
-- RLS (Row Level Security) - optionnel mais recommandé
ALTER TABLE compositions ENABLE ROW LEVEL SECURITY;
`;

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
function init() {
  renderMain();
  if (currentUser) loadCompos();

  // Écouter les changements de connexion depuis auth-bundle
  const origSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(key, value) {
    origSetItem(key, value);
    if (key === 'ksUser') {
      try { currentUser = JSON.parse(value); } catch(e) { currentUser = null; }
      compositions = [];
      renderMain();
      if (currentUser) loadCompos();
    }
  };

  const origRemoveItem = localStorage.removeItem.bind(localStorage);
  localStorage.removeItem = function(key) {
    origRemoveItem(key);
    if (key === 'ksUser') {
      currentUser = null;
      compositions = [];
      renderMain();
    }
  };
}

// Charger Supabase SDK puis init
(function loadSDK() {
  if (typeof supabase !== 'undefined') { init(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload = () => { sb = supabase.createClient(SUPA_URL, SUPA_KEY); init(); };
  s.onerror = () => { toast('Erreur chargement SDK Supabase', 'err'); init(); };
  document.head.appendChild(s);
})();
</script>

<script src="auth-bundle.js"></script>
</body>
