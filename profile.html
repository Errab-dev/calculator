<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — Kingshot Help</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #f0f3f7;
  --surface:    #ffffff;
  --surface2:   #edf0f5;
  --border:     #ccd4e0;
  --border2:    #dde3ec;
  --amber:      #b86e00;
  --amber-dim:  #d48820;
  --amber-glow: rgba(184,110,0,.10);
  --red:        #c0392b;
  --red-dim:    rgba(192,57,43,.10);
  --green:      #1a7a44;
  --green-dim:  rgba(26,122,68,.10);
  --inf:        #1a68aa;
  --cav:        #1e8040;
  --arc:        #8a5800;
  --text:       #18202e;
  --text-dim:   #445068;
  --text-faint: #8090a8;
  --f-display:  'Barlow Condensed', sans-serif;
  --f-body:     'Barlow', sans-serif;
  --f-mono:     'Share Tech Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  padding: 0 0 80px;
  background-image:
    linear-gradient(rgba(180,195,215,.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,195,215,.4) 1px, transparent 1px);
  background-size: 40px 40px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.008) 2px, rgba(0,0,0,.008) 4px);
  pointer-events: none; z-index: 100;
}

.page { max-width: 680px; margin: 0 auto; padding: 0 16px; }

/* ── SUBNAV (onglets fixes sous la navbar) ── */
#profileSubnav {
  position: fixed;
  top: 48px;
  left: 0; right: 0;
  z-index: 8000;
  background: rgba(24,32,46,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(184,110,0,0.25);
  display: flex;
  padding: 0 20px;
  height: 38px;
  align-items: center;
}
#profileSubnav .pnav-btn {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 0 12px;
  height: 100%;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
#profileSubnav .pnav-btn.active {
  color: #b86e00;
  border-bottom-color: #b86e00;
}
/* navbar (48px) + subnav (38px) = 86px */
body { padding-top: 86px !important; }

/* ── HEADER ── */
.hdr {
  padding: 32px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  position: relative;
}
.hdr::after {
  content: ''; position: absolute; bottom: -1px; left: 0;
  width: 80px; height: 2px;
  background: var(--amber); box-shadow: 0 0 12px var(--amber);
}
.hdr-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.hdr-label { font-family: var(--f-mono); font-size: 11px; color: var(--amber); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; opacity: .9; }
.hdr-title { font-family: var(--f-display); font-size: 3rem; font-weight: 900; line-height: .9; text-transform: uppercase; letter-spacing: -1px; color: var(--text); }
.hdr-title span { color: var(--amber); }
.hdr-sub { font-family: var(--f-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
.back-link {
  font-family: var(--f-mono); font-size: 11px; color: var(--amber);
  text-decoration: none; letter-spacing: 1.5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
  transition: opacity .2s;
}
.back-link:hover { opacity: .7; }

/* ── SECTION ── */
.sec {
  display: flex; align-items: center; gap: 0;
  margin: 28px 0 14px;
}
.sec-num {
  font-family: var(--f-mono); font-size: 11px; color: #fff;
  background: var(--amber); padding: 4px 10px;
  letter-spacing: 1px; font-weight: 700; flex-shrink: 0;
}
.sec-body {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border); border-left: none;
  padding: 9px 16px;
}
.sec-title { font-family: var(--f-display); font-size: 1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
.sec-desc  { font-size: 12px; color: var(--text-faint); margin-top: 1px; }

/* ── PANEL ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  margin-bottom: 10px;
}
.panel-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.panel-body { padding: 16px 18px; }

/* ── PROFIL INFO ── */
.profile-info {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.profile-avatar {
  width: 52px; height: 52px;
  background: var(--amber-glow);
  border: 2px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-display); font-size: 1.6rem; font-weight: 900;
  color: var(--amber); text-transform: uppercase; flex-shrink: 0;
}
.profile-name {
  font-family: var(--f-display); font-size: 1.8rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px; line-height: 1;
}
.profile-meta {
  font-family: var(--f-mono); font-size: 10px; color: var(--text-faint);
  letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.profile-meta span { color: var(--amber); }

/* ── BOUTONS ── */
.btn {
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; padding: 7px 14px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
.btn-primary { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
.btn-primary:hover { background: rgba(184,110,0,.2); }
.btn-green { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.btn-green:hover { background: rgba(26,122,68,.2); }
.btn-red { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.btn-red:hover { background: rgba(192,57,43,.2); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* ── COMPO CARDS ── */
.compo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
.compo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
  transition: box-shadow .2s, border-color .2s, transform .2s;
}
.compo-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber), transparent 70%);
}
.compo-card:hover {
  border-color: var(--amber-dim);
  box-shadow: 0 4px 20px rgba(184,110,0,.10);
  transform: translateY(-2px);
}
.compo-card-body { padding: 14px 16px 12px; }
.compo-name {
  font-family: var(--f-display); font-size: 1.1rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text);
  margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.compo-summary {
  font-family: var(--f-mono); font-size: 11px; color: var(--text-faint);
  letter-spacing: 1px; margin-bottom: 10px; line-height: 1.8;
}
.compo-summary-line { display: flex; align-items: center; gap: 6px; }
.compo-summary-line .lbl { color: var(--text-dim); min-width: 60px; }
.compo-date {
  font-family: var(--f-mono); font-size: 9px; color: var(--text-faint);
  letter-spacing: 1px; text-transform: uppercase;
  position: absolute; top: 10px; right: 12px;
}
.compo-actions { display: flex; gap: 6px; border-top: 1px solid var(--border2); padding: 10px 16px; }
.compo-actions .btn { flex: 1; text-align: center; font-size: 10px; padding: 6px 8px; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 40px 20px;
  border: 1px dashed var(--border2);
  background: var(--surface2);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .5; }
.empty-title { font-family: var(--f-display); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
.empty-sub { font-size: 13px; color: var(--text-faint); margin-top: 6px; }

/* ── NOT LOGGED ── */
.not-logged {
  text-align: center; padding: 48px 20px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.not-logged-icon { font-size: 3rem; margin-bottom: 16px; }
.not-logged-title { font-family: var(--f-display); font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
.not-logged-sub { font-size: 13px; color: var(--text-dim); margin-top: 8px; max-width: 320px; margin-left: auto; margin-right: auto; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-box {
  background: var(--bg);
  border: 1px solid var(--border);
  max-width: 440px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  padding: 24px;
  position: relative;
}
.modal-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber), transparent 70%);
}
.modal-title {
  font-family: var(--f-display); font-size: 1.3rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
}
.field-label {
  font-family: var(--f-mono); font-size: 10px; color: var(--text-dim);
  letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px;
}
.field-input {
  width: 100%; padding: 8px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  font-family: var(--f-body); font-size: 14px; color: var(--text);
  outline: none; transition: border-color .2s;
}
.field-input:focus { border-color: var(--amber); }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

/* ── LOADING ── */
.loading-bar {
  height: 2px; background: var(--surface2);
  border: 1px solid var(--border2);
  overflow: hidden; margin-bottom: 16px;
}
.loading-bar-inner {
  height: 100%;
  background: var(--amber);
  animation: loadAnim 1s ease-in-out infinite alternate;
  width: 40%;
}
@keyframes loadAnim { from { margin-left: 0 } to { margin-left: 60% } }

/* ── BONUS INPUTS ── */
.bonus-input-wrap { display:flex; align-items:center; gap:3px; }
.bonus-field { width:100%; padding:7px 8px; background:var(--surface2); border:1px solid var(--border); font-family:var(--f-mono); font-size:13px; color:var(--text); outline:none; text-align:center; }
.bonus-field:focus { border-color:var(--amber); }
.bonus-pct { font-family:var(--f-mono); font-size:11px; color:var(--text-faint); }

/* ── TOAST ── */
#profToast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; font-family: var(--f-mono); font-size: 12px;
  letter-spacing: 1px; z-index: 9999; transition: opacity .4s;
  pointer-events: none; opacity: 0; color: #fff;
}

/* ── FOOTER ── */
footer {
  text-align: center; margin-top: 48px;
  padding-top: 20px; border-top: 1px solid var(--border2);
  font-family: var(--f-mono); font-size: 10px;
  letter-spacing: 1.5px; color: var(--text-faint); text-transform: uppercase;
}

/* ── ANIM ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hdr        { animation: fadeUp .3s ease both; }
.sec        { animation: fadeUp .3s ease both .08s; }
#mainContent{ animation: fadeUp .3s ease both .12s; }

/* ── HEROES ── */
.hero-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 10px 8px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  text-align: center;
}
.hero-card:hover { border-color: var(--amber); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(184,110,0,.12); }
.hero-card.configured { border-color: var(--green); }
.hero-card.configured::after {
  content: '✓'; position: absolute; top: 4px; right: 6px;
  font-size: 9px; color: var(--green); font-family: var(--f-mono);
}
.hero-card-initial {
  width: 40px; height: 40px; margin: 0 auto 6px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--f-display); font-size: 1.1rem; font-weight: 900;
  text-transform: uppercase; border: 2px solid;
}
.hci-inf { background: rgba(26,104,170,.15); border-color: rgba(26,104,170,.4); color: var(--inf); }
.hci-cav { background: rgba(30,128,64,.15);  border-color: rgba(30,128,64,.4);  color: var(--cav); }
.hci-arc { background: rgba(138,88,0,.15);   border-color: rgba(138,88,0,.4);   color: var(--arc); }
.hero-card-name { font-family: var(--f-display); font-size: .85rem; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; line-height: 1.1; }
.hero-card-meta { font-family: var(--f-mono); font-size: 9px; color: var(--text-faint); letter-spacing: 1px; margin-top: 2px; }
.hero-gen-label {
  font-family: var(--f-mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-faint); margin: 18px 0 8px;
  display: flex; align-items: center; gap: 8px;
}
.hero-gen-label::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

/* Modale héros */
.hero-modal-overlay {
  position: fixed; inset: 0; z-index: 9100;
  background: rgba(0,0,0,.5); display: flex;
  align-items: center; justify-content: center; padding: 16px;
}
.hero-modal-box {
  background: var(--bg);
  border: 1px solid var(--border);
  max-width: 480px; width: 100%;
  max-height: 88vh; overflow-y: auto;
  padding: 20px;
  position: relative;
}
.hero-modal-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--amber), transparent 70%);
}
.hero-modal-title {
  font-family: var(--f-display); font-size: 1.4rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;
}
.hero-modal-sub { font-family: var(--f-mono); font-size: 10px; color: var(--text-faint); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px; }
.hero-section-title {
  font-family: var(--f-mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-faint); margin: 14px 0 8px;
  display: flex; align-items: center; gap: 8px;
}
.hero-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

/* Stats héros */
.hero-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
.hstat-field { display: flex; flex-direction: column; gap: 3px; }
.hstat-label { font-family: var(--f-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); }
.hstat-input {
  padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border);
  font-family: var(--f-mono); font-size: 13px; color: var(--text);
  outline: none; transition: border-color .2s; width: 100%;
}
.hstat-input:focus { border-color: var(--amber); }

/* Skills niveaux */
.skill-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.skill-info { flex: 1; }
.skill-name { font-size: 13px; font-weight: 600; color: var(--text); }
.skill-desc { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
.skill-levels { display: flex; gap: 4px; flex-shrink: 0; }
.skill-lvl-btn {
  width: 26px; height: 26px; border: 1px solid var(--border);
  background: var(--surface2); font-family: var(--f-mono); font-size: 10px;
  color: var(--text-faint); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.skill-lvl-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }

/* Widget */
.widget-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.widget-info { flex: 1; }
.widget-name { font-size: 13px; font-weight: 600; color: var(--text); }
.widget-desc { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
.widget-levels { display: flex; gap: 4px; }
.widget-lvl-btn {
  width: 28px; height: 28px; border: 1px solid var(--border);
  background: var(--surface2); font-family: var(--f-mono); font-size: 10px;
  color: var(--text-faint); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.widget-lvl-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }

</style>
</head>
<body>
<div class="page">

  <!-- SUBNAV ONGLETS (fixe sous navbar) -->
  <div id="profileSubnav" style="display:none">
    <button class="pnav-btn active" id="pnav-compos" onclick="switchTab('compos')">Compositions</button>
    <button class="pnav-btn" id="pnav-stats"  onclick="switchTab('stats')">Stats Bonus</button>
    <button class="pnav-btn" id="pnav-heroes" onclick="switchTab('heroes')">Héros</button>
  </div>

  <!-- CONTENU -->
  <div id="mainContent">
    <!-- rempli par JS -->
  </div>

</div>

<footer>Kingshot Help · Non affilié à Century Games</footer>
<div id="profToast"></div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG SUPABASE
// ══════════════════════════════════════════════════
const SUPA_URL = 'https://ndusomdjunpvabmwvuqr.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdXNvbWRqdW5wdmFibXd2dXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzcwNjYsImV4cCI6MjA5MDkxMzA2Nn0.5AD_2hvmJQlPQnum75R1-vrFgxpQXqYBAgHKwuFApsc';

let sb = null;
let currentUser = null;
let compositions = [];

try { currentUser = JSON.parse(localStorage.getItem('ksUser') || 'null'); } catch(e) {}

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
function fmtN(n) {
  const v = Number(n);
  if (!v || isNaN(v)) return '0';
  return v.toLocaleString('fr-FR');
}

function toast(msg, type = 'info') {
  const t = document.getElementById('profToast');
  const colors = { ok: '#1a7a44', err: '#c0392b', info: '#b86e00' };
  t.textContent = msg;
  t.style.background = colors[type] || colors.info;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', 2500);
}

function getSb() {
  if (!sb && typeof supabase !== 'undefined') {
    sb = supabase.createClient(SUPA_URL, SUPA_KEY);
  }
  return sb;
}

// ══════════════════════════════════════════════════
//  RÉSUMÉ D'UNE COMPOSITION
// ══════════════════════════════════════════════════
function calcTroops(cap, exactI, exactC, exactA, ri, rc, ra) {
  cap = Number(cap || 0);
  if (cap <= 0) return null;
  let i, c, a;
  if (exactI !== undefined && exactI !== '' && exactI !== null) {
    i = Number(exactI); c = Number(exactC); a = Number(exactA);
  } else {
    i = Math.round(cap * Number(ri || 10) / 100);
    c = Math.round(cap * Number(rc || 10) / 100);
    a = cap - i - c;
  }
  return { i, c, a };
}

function buildCompoSummary(cs) {
  const inf = Number(cs.inf || 0);
  const cav = Number(cs.cav || 0);
  const arc = Number(cs.arc || 0);
  const leadCap = Number(cs.leadCap || 0);
  const joiners = (cs.joiners || []).filter(j => Number(j.cap || 0) > 0);

  const lines = [];

  if (inf || cav || arc) {
    lines.push({ lbl: 'Stocks', val: `INF ${fmtN(inf)} · CAV ${fmtN(cav)} · ARC ${fmtN(arc)}` });
  }
  if (leadCap) {
    const t = calcTroops(leadCap, cs.leadExactI, cs.leadExactC, cs.leadExactA, cs.lInf, cs.lCav, cs.lArc);
    if (t) lines.push({ lbl: '👑 Lead', val: `INF ${fmtN(t.i)} · CAV ${fmtN(t.c)} · ARC ${fmtN(t.a)}` });
    else   lines.push({ lbl: '👑 Lead', val: fmtN(leadCap) + ' troupes' });
  }
  joiners.forEach((j, idx) => {
    const t = calcTroops(j.cap, j.exactI, j.exactC, j.exactA, j.inf, j.cav, j.arc);
    if (t) lines.push({ lbl: `⚡ J${idx + 1}`, val: `INF ${fmtN(t.i)} · CAV ${fmtN(t.c)} · ARC ${fmtN(t.a)}` });
    else   lines.push({ lbl: `⚡ J${idx + 1}`, val: fmtN(j.cap) + ' troupes' });
  });

  if (lines.length === 0) lines.push({ lbl: 'Stocks', val: 'Aucune donnée' });
  return lines;
}

  const html = `<div class="compo-grid">${compositions.map((c, i) => {

      ? new Date(c.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: '2-digit' })

function switchTab(tab) {
  const tabs = {
    compos:  document.getElementById('tabCompos'),
    stats:   document.getElementById('tabStats'),
    heroes:  document.getElementById('tabHeroes'),
  };
  const btns = {
    compos:  document.getElementById('pnav-compos'),
    stats:   document.getElementById('pnav-stats'),
    heroes:  document.getElementById('pnav-heroes'),
  };
  Object.keys(tabs).forEach(k => {
    if (!tabs[k]) return;
    tabs[k].style.display = (k === tab) ? '' : 'none';
    if (btns[k]) btns[k].classList.toggle('active', k === tab);
  });
  if (tab === 'heroes') renderHeroesGrid();
}

//  STATS BONUS
// ══════════════════════════════════════════════════
const BONUS_FIELDS = ['bAtkInf','bAtkCav','bAtkArc','bLthInf','bLthCav','bLthArc','bAtkSquad','bLthSquad'];
const BONUS_MAP    = { bAtkInf:'bonusAtkInf', bAtkCav:'bonusAtkCav', bAtkArc:'bonusAtkArc',
                       bLthInf:'bonusLthInf', bLthCav:'bonusLthCav', bLthArc:'bonusLthArc',
                       bAtkSquad:'bonusAtkSquad', bLthSquad:'bonusLthSquad' };

let _statsTimer = null;

function onStatsChange() {
  // Écrire immédiatement dans localStorage pour le calculateur
  const data = {};
  BONUS_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    const calcId = BONUS_MAP[id];
    data[calcId] = el ? (parseFloat(el.value) || 0) : 0;
  });
  localStorage.setItem('bearBonusStats', JSON.stringify(data));

  // Sauvegarder dans Supabase avec debounce 1.5s
  clearTimeout(_statsTimer);
  _statsTimer = setTimeout(saveStatsToCloud, 1500);

  // Indicateur visuel
  const ind = document.getElementById('statsSaveIndicator');
  if (ind) { ind.style.opacity = '0'; }
}

async function saveStatsToCloud() {
  const client = getSb();
  if (!client || !currentUser) return;
  const data = {};
  BONUS_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    data[BONUS_MAP[id]] = el ? (parseFloat(el.value) || 0) : 0;
  });
  try {
    const res = await client.from('profiles')
      .update({ bonus_stats: data })
      .eq('id', currentUser.id);
    if (res.error) throw res.error;
    const ind = document.getElementById('statsSaveIndicator');
    if (ind) { ind.style.opacity = '1'; setTimeout(() => ind.style.opacity = '0', 1500); }
  } catch(e) {
    console.error('saveStatsToCloud error:', e);
    toast('Erreur sauvegarde stats', 'err');
  }
}

async function loadBonusStats() {
  // 1. Lire localStorage d'abord (rapide)
  try {
    const raw = localStorage.getItem('bearBonusStats');
    if (raw) {
      const data = JSON.parse(raw);
      BONUS_FIELDS.forEach(id => {
        const calcId = BONUS_MAP[id];
        const el = document.getElementById(id);
        if (el && data[calcId] !== undefined) el.value = data[calcId] || '';
      });
    }
  } catch(e) {}

  // 2. Puis charger depuis Supabase (source de vérité)
  const client = getSb();
  if (!client || !currentUser) return;
  try {
    const res = await client.from('profiles')
      .select('bonus_stats')
      .eq('id', currentUser.id)
      .single();
    if (res.error || !res.data?.bonus_stats) return;
    const data = res.data.bonus_stats;
    BONUS_FIELDS.forEach(id => {
      const calcId = BONUS_MAP[id];
      const el = document.getElementById(id);
      if (el && data[calcId] !== undefined) el.value = data[calcId] || '';
    });
    // Sync localStorage
    localStorage.setItem('bearBonusStats', JSON.stringify(data));
  } catch(e) {}
}

// ══════════════════════════════════════════════════
//  RENDER GRILLE HÉROS
// ══════════════════════════════════════════════════
function renderHeroesGrid() {
  const el = document.getElementById('heroesGrid');
  if (!el) return;

  function renderGroup(keys, genLabel) {
    let html = `<div class="hero-gen-label">${genLabel}</div><div class="hero-grid">`;
    keys.forEach(key => {
      const h = HEROES_DB[key];
      if (!h) return;
      const configured = !!heroesData[key];
      const initial = h.name[0].toUpperCase();
      const clsColor = { inf:'hci-inf', cav:'hci-cav', arc:'hci-arc' }[h.cls] || 'hci-inf';
      const clsLabel = { inf:'INF', cav:'CAV', arc:'ARC' }[h.cls] || '';
      html += `
        <div class="hero-card${configured ? ' configured' : ''}" onclick="openHeroModal('${key}')">
          <div class="hero-card-initial ${clsColor}">${initial}</div>
          <div class="hero-card-name">${h.name}</div>
          <div class="hero-card-meta">${clsLabel}</div>
        </div>`;
    });
    html += '</div>';
    return html;
  }

  // Grouper par génération
  const genGroups = {};
  MYTHIC_KEYS.forEach(k => {
    const h = HEROES_DB[k];
    const g = h.gen;
    if (!genGroups[g]) genGroups[g] = [];
    genGroups[g].push(k);
  });

  let html = '';
  Object.keys(genGroups).sort((a,b) => a-b).forEach(g => {
    html += renderGroup(genGroups[g], `Génération ${g} — Mythiques`);
  });
  html += renderGroup(SR_KEYS, 'SR / Épiques');

  el.innerHTML = html;
}

let _currentHeroKey = null;

function openHeroModal(key) {
  _currentHeroKey = key;
  const h = HEROES_DB[key];
  if (!h) return;

      <!-- Compétences d'expédition -->

        <div style="display:flex;gap:8px">
          <button class="btn" onclick="closeHeroModal()">Annuler</button>
          <button class="btn btn-green" onclick="saveHeroModal('${key}')">✓ Enregistrer</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  renderHeroSkills(key);
}

function renderHeroSkills(key) {
  const h = HEROES_DB[key];
  const container = document.getElementById('heroSkillsContainer');
  if (!container || !h) return;

  container.innerHTML = h.skills.map((sk, idx) => {
    const currentLvl = _heroModalState.skillLevels[idx] || 1;
    const levelsHtml = [1,2,3,4,5].map(lv => `
      <button class="skill-lvl-btn${currentLvl === lv ? ' active' : ''}"
        onclick="setSkillLevel(${idx}, ${lv})">${lv}</button>
    `).join('');
    return `
      <div class="skill-row">
        <div class="skill-info">
          <div class="skill-name">${sk.nom}</div>
          <div class="skill-desc" id="skillDesc_${idx}">${sk.desc(currentLvl)}</div>
        </div>
        <div class="skill-levels" id="skillLevels_${idx}">${levelsHtml}</div>
      </div>`;
  }).join('');
}

function setSkillLevel(skillIdx, level) {
  const key = _currentHeroKey;
  const h = HEROES_DB[key];
  _heroModalState.skillLevels[skillIdx] = level;

  // Mettre à jour les boutons
  const container = document.getElementById(`skillLevels_${skillIdx}`);
  if (container) {
    container.querySelectorAll('.skill-lvl-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i + 1 === level);
    });
  }
  // Mettre à jour la description
  const descEl = document.getElementById(`skillDesc_${skillIdx}`);
  if (descEl && h?.skills[skillIdx]) descEl.textContent = h.skills[skillIdx].desc(level);
}

function setWidgetLevel(level) {
  const h = HEROES_DB[_currentHeroKey];
  if (!h?.widget) return;
  _heroModalState.widgetLevel = level;
  // Mettre à jour le select
  const sel = document.getElementById('widgetLevels');
  if (sel) sel.value = level;
  // Mettre à jour les descriptions
  const d1 = document.getElementById('widgetDesc');
  const d2 = document.getElementById('widgetDesc1');
  if (d1) d1.textContent = level > 0 ? h.widget.skill2.desc(Math.floor(level/2)) : 'Niveau 0 — non débloqué';
  if (d2) d2.textContent = level > 0 ? 'Skill Conquest : ' + h.widget.skill1.desc(Math.ceil(level/2)) : '';
}

function saveHeroModal(key) {
  // Lire les stats depuis les inputs (au cas où oninput n'a pas tout capturé)
  _heroModalState.heroStats.atk = document.getElementById('hstat_atk')?.value || '';
  _heroModalState.heroStats.def = document.getElementById('hstat_def')?.value || '';
  _heroModalState.heroStats.lth = document.getElementById('hstat_lth')?.value || '';
  _heroModalState.heroStats.hp  = document.getElementById('hstat_hp')?.value  || '';

  heroesData[key] = {
    skillLevels: [..._heroModalState.skillLevels],
    widgetLevel: _heroModalState.widgetLevel,
    heroStats:   { ..._heroModalState.heroStats }
  };

  // Sauvegarder
  saveHeroesToCloud();
  closeHeroModal();
  renderHeroesGrid(); // refresh les cartes (badge ✓)
}

function resetHeroData(key) {
  if (!confirm(`Réinitialiser les données de ${HEROES_DB[key]?.name} ?`)) return;
  delete heroesData[key];
  saveHeroesToCloud();
  closeHeroModal();
  renderHeroesGrid();
}

function closeHeroModal() {
  document.getElementById('heroModalOverlay')?.remove();
  _currentHeroKey = null;
}

// ══════════════════════════════════════════════════
//  SAUVEGARDE HÉROS CLOUD + LOCAL
// ══════════════════════════════════════════════════
async function saveHeroesToCloud() {
  // Sync localStorage immédiatement
  localStorage.setItem('bearHeroesData', JSON.stringify(heroesData));

  // Debounce cloud save
  clearTimeout(_heroSaveTimer);
  _heroSaveTimer = setTimeout(async () => {
    const client = getSb();
    if (!client || !currentUser) return;
    try {
      await client.from('profiles')
        .update({ heroes_data: heroesData })
        .eq('id', currentUser.id);
      toast('Héros sauvegardé ✓', 'ok');
    } catch(e) {
      toast('Erreur sauvegarde héros', 'err');
    }
  }, 800);
}

async function loadHeroesData() {
  // 1. localStorage d'abord
  try {
    const raw = localStorage.getItem('bearHeroesData');
    if (raw) heroesData = JSON.parse(raw);
  } catch(e) {}

  // 2. Supabase (source de vérité)
  const client = getSb();
  if (!client || !currentUser) return;
  try {
    const res = await client.from('profiles')
      .select('heroes_data')
      .eq('id', currentUser.id)
      .single();
    if (res.data?.heroes_data && Object.keys(res.data.heroes_data).length > 0) {
      heroesData = res.data.heroes_data;
      localStorage.setItem('bearHeroesData', JSON.stringify(heroesData));
    }
  } catch(e) {}
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════
//  CHARGER LES COMPOSITIONS DEPUIS SUPABASE
// ══════════════════════════════════════════════════
async function loadCompos() {
  const client = getSb();
  if (!client) { showDebug('Supabase non disponible'); return; }
  if (!currentUser) { showDebug('Non connecté'); return; }

  showLoading(true);
  try {
    // Test 1 : requête sans filtre pour voir si la table est accessible
    const testRes = await client.from('compositions').select('id, user_id, name').limit(3);
    if (testRes.error) {
      showLoading(false);
      renderCompos();
      return;
    }

    // Test 2 : requête filtrée par user_id
    const res = await client
      .from('compositions')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    if (res.error) {
      showLoading(false);
      renderCompos();
      return;
    }

    compositions = res.data || [];
  } catch(e) {
  }
  showLoading(false);
  renderCompos();
}


// ══════════════════════════════════════════════════
//  SAUVEGARDER UNE COMPOSITION
// ══════════════════════════════════════════════════
function openSaveModal() {
  const raw = localStorage.getItem('bearCalcState');
  if (!raw) {
    toast('Aucune config à sauvegarder — ouvre d\'abord le calculateur', 'err');
    return;
  }

  const modal = createModal(`
    <div class="modal-title">💾 Sauvegarder la composition</div>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:14px">Donne un nom à ta configuration Bear Hunt actuelle.</p>
    <label class="field-label">Nom de la composition</label>
    <input id="compoNameInput" class="field-input" type="text" placeholder="ex : Rally 5 joiners INF" maxlength="60" autofocus>
    <div id="saveError" style="display:none;margin-top:8px;font-size:12px;color:var(--red)"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-green" onclick="doSaveCompo()">✓ Sauvegarder</button>
    </div>
  `);

  setTimeout(() => document.getElementById('compoNameInput')?.focus(), 50);
  document.getElementById('compoNameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSaveCompo();
  });
}

async function doSaveCompo() {
  const nameEl = document.getElementById('compoNameInput');
  const errEl  = document.getElementById('saveError');
  const name = (nameEl?.value || '').trim();

  if (!name) {
    errEl.textContent = 'Donne un nom à ta composition';
    errEl.style.display = 'block';
    return;
  }

  const raw = localStorage.getItem('bearCalcState');
  if (!raw) { toast('Aucune config trouvée', 'err'); closeModal(); return; }

  let calcState;
  try { calcState = JSON.parse(raw); } catch(e) { toast('Config invalide', 'err'); closeModal(); return; }

  const client = getSb();
  if (!client) { toast('Supabase non disponible', 'err'); return; }

  nameEl.disabled = true;
  try {
    const res = await client.from('compositions').insert({
      user_id:    currentUser.id,
      username:   currentUser.username,
      name:       name,
      calc_state: calcState
    }).select().single();

    if (res.error) throw res.error;
    compositions.unshift(res.data);
    toast('Composition sauvegardée !', 'ok');
    closeModal();
    renderCompos();
  } catch(e) {
    console.error('Save compo error:', e);
    // Table absente → afficher message d'aide
    if (e.code === '42P01' || e.message?.includes('does not exist')) {
      errEl.innerHTML = 'Table <code>compositions</code> manquante dans Supabase.<br>Voir console pour le SQL de création.';
      console.warn('SQL à exécuter dans Supabase :\n' + CREATE_TABLE_SQL);
    } else {
      errEl.textContent = 'Erreur : ' + e.message;
    }
    errEl.style.display = 'block';
    nameEl.disabled = false;
  }
}

// ══════════════════════════════════════════════════
//  CHARGER UNE COMPOSITION DANS LE CALCULATEUR
// ══════════════════════════════════════════════════
function loadCompo(idx) {
  const c = compositions[idx];
  if (!c) return;

  if (!confirm(`Charger "${c.name}" ?\nCela remplacera ta config actuelle dans le calculateur.`)) return;

  try {
    // Debug : vérifier que calc_state existe et contient des données
    if (!c.calc_state || Object.keys(c.calc_state).length === 0) {
      toast('Erreur : composition vide ou corrompue', 'err');
      console.error('calc_state vide:', c);
      return;
    }
    const json = JSON.stringify(c.calc_state);
    // Écrire dans les deux pour maximiser les chances
    localStorage.setItem('bearCalcState', json);
    sessionStorage.setItem('bearCalcLoad', json);
    toast('Config chargée ! Redirection…', 'ok');
    window.location.href = 'bear_calculator.html?fromProfile=1';
  } catch(e) {
    console.error('loadCompo error:', e);
    toast('Erreur lors du chargement : ' + e.message, 'err');
  }
}

// ══════════════════════════════════════════════════
//  RENOMMER
// ══════════════════════════════════════════════════
function openRenameModal(idx) {
  const c = compositions[idx];
  if (!c) return;

  createModal(`
    <div class="modal-title">✎ Renommer</div>
    <label class="field-label">Nouveau nom</label>
    <input id="renameInput" class="field-input" type="text" value="${escHtml(c.name)}" maxlength="60">
    <div id="renameError" style="display:none;margin-top:8px;font-size:12px;color:var(--red)"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="doRename(${idx})">✓ Renommer</button>
    </div>
  `);

  setTimeout(() => {
    const inp = document.getElementById('renameInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

async function doRename(idx) {
  const c = compositions[idx];
  const nameEl = document.getElementById('renameInput');
  const errEl  = document.getElementById('renameError');
  const name = (nameEl?.value || '').trim();

  if (!name) { errEl.textContent = 'Nom invalide'; errEl.style.display = 'block'; return; }

  const client = getSb();
  try {
    const res = await client.from('compositions').update({ name }).eq('id', c.id);
    if (res.error) throw res.error;
    compositions[idx].name = name;
    toast('Renommée !', 'ok');
    closeModal();
    renderCompos();
  } catch(e) {
    errEl.textContent = 'Erreur : ' + e.message;
    errEl.style.display = 'block';
  }
}

// ══════════════════════════════════════════════════
//  SUPPRIMER
// ══════════════════════════════════════════════════
async function deleteCompo(idx) {
  const c = compositions[idx];
  if (!c) return;
  if (!confirm(`Supprimer "${c.name}" ? Cette action est irréversible.`)) return;

  const client = getSb();
  try {
    const res = await client.from('compositions').delete().eq('id', c.id);
    if (res.error) throw res.error;
    compositions.splice(idx, 1);
    toast('Composition supprimée', 'info');
    renderCompos();
  } catch(e) {
    toast('Erreur : ' + e.message, 'err');
  }
}

// ══════════════════════════════════════════════════
//  MODIFIER PROFIL
// ══════════════════════════════════════════════════
function openEditProfile() {
  createModal(`
    <div class="modal-title">⚙ Modifier le profil</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label class="field-label">Alliance (tag)</label>
        <input id="editAlliance" class="field-input" type="text" value="${escHtml(currentUser.alliance || '')}" placeholder="[TAG]">
      </div>
      <div>
        <label class="field-label">Serveur</label>
        <input id="editServer" class="field-input" type="text" value="${escHtml(currentUser.server || '')}" placeholder="S.1507">
      </div>
    </div>
    <div id="editError" style="display:none;margin-top:8px;font-size:12px;color:var(--red)"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="doEditProfile()">✓ Enregistrer</button>
    </div>
  `);
}

async function doEditProfile() {
  const alliance = (document.getElementById('editAlliance')?.value || '').trim();
  const server   = (document.getElementById('editServer')?.value   || '').trim();
  const errEl    = document.getElementById('editError');
  const client   = getSb();
  if (!client) return;

  try {
    const res = await client.from('profiles')
      .update({ alliance, server })
      .eq('id', currentUser.id);
    if (res.error) throw res.error;
    currentUser.alliance = alliance;
    currentUser.server   = server;
    localStorage.setItem('ksUser', JSON.stringify(currentUser));
    toast('Profil mis à jour', 'ok');
    closeModal();
    renderMain();
    setTimeout(renderCompos, 50);
  } catch(e) {
    errEl.textContent = 'Erreur : ' + e.message;
    errEl.style.display = 'block';
  }
}

// ══════════════════════════════════════════════════
//  MODAL HELPER
// ══════════════════════════════════════════════════
function createModal(innerHtml) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'profModal';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal-box">${innerHtml}</div>`;
  document.body.appendChild(overlay);
  return overlay;
}

function closeModal() {
  document.getElementById('profModal')?.remove();
}

// ══════════════════════════════════════════════════
//  LOADING
// ══════════════════════════════════════════════════
function showLoading(show) {
  let bar = document.getElementById('profLoadingBar');
  if (show) {
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'profLoadingBar';
      bar.className = 'loading-bar';
      bar.innerHTML = '<div class="loading-bar-inner"></div>';
      document.getElementById('mainContent').prepend(bar);
    }
  } else {
    bar?.remove();
  }
}

// ══════════════════════════════════════════════════
//  SQL DE CRÉATION DE LA TABLE (log console si absente)
// ══════════════════════════════════════════════════
const CREATE_TABLE_SQL = `
-- À exécuter dans Supabase > SQL Editor
CREATE TABLE IF NOT EXISTS compositions (
  id         UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id    UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  username   TEXT NOT NULL,
  name       TEXT NOT NULL,
  calc_state JSONB NOT NULL DEFAULT '{}',
  created_at TIMESTAMPTZ DEFAULT now()
);
-- Index pour les requêtes par user
CREATE INDEX IF NOT EXISTS idx_compositions_user_id ON compositions(user_id);
-- RLS (Row Level Security) - optionnel mais recommandé
ALTER TABLE compositions ENABLE ROW LEVEL SECURITY;
`;

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
function init() {
  renderMain();
  if (currentUser) loadCompos();

  // Écouter les changements de connexion depuis auth-bundle
  const origSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(key, value) {
    origSetItem(key, value);
    if (key === 'ksUser') {
      try { currentUser = JSON.parse(value); } catch(e) { currentUser = null; }
      compositions = [];
      renderMain();
      if (currentUser) loadCompos();
    }
  };

  const origRemoveItem = localStorage.removeItem.bind(localStorage);
  localStorage.removeItem = function(key) {
    origRemoveItem(key);
    if (key === 'ksUser') {
      currentUser = null;
      compositions = [];
      renderMain();
    }
  };
}

// Charger Supabase SDK puis init
(function loadSDK() {
  if (typeof supabase !== 'undefined') { init(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload = () => { sb = supabase.createClient(SUPA_URL, SUPA_KEY); init(); };
  s.onerror = () => { toast('Erreur chargement SDK Supabase', 'err'); init(); };
  document.head.appendChild(s);
})();
</script>

<script src="auth-bundle.js"></script>
</body>
